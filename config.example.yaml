# GitHub Configuration
github:
  # Personal access token with repo scope
  # Generate at: https://github.com/settings/tokens
  token: "ghp_your_token_here"

  # List of repositories to track (format: owner/repo)
  repositories:
    - "octocat/Hello-World"
    - "octocat/Spoon-Knife"

# Claude AI Configuration
claude:
  # Claude API key
  # Get your key at: https://console.anthropic.com/settings/keys
  api_key: "sk-ant-your_key_here"

  # Model to use for categorization (optional)
  # Default: claude-sonnet-4-5
  # model: "claude-sonnet-4-5"

# Filter Configuration
filters:
  # Date range for PRs
  # Examples: "7d", "2025-01-01", "2025-01-01T14:30:00", "2025-01-01:2025-12-31"
  # Relative: "7d" = last 7 days, "14d" = last 14 days
  # Timestamps without timezone use your local timezone
  since: "7d"

  # PR states to include: open, closed, merged, all
  states:
    - "merged"

  # Optional: Filter by specific labels (empty list = all labels)
  # labels:
  #   - "feature"
  #   - "bug"
  #   - "enhancement"

# Changelog Organization
output:
  # Categories for PRs - Claude will intelligently categorize each PR
  # based on its title and description into one of these categories
  # and generate a concise summary for each
  categories:
    - "Features"
    - "Bug Fixes"
    - "Dev Ex"

  # Include PR author in changelog entries
  show_author: true

  # Include PR number/link
  show_pr_number: true

  # Skip AI categorization - output PRs as a flat list without category headers
  # skip_categorization: false

  # Skip AI summaries - use original PR titles instead of AI-generated summaries
  # skip_summaries: false

  # Optional: Map GitHub usernames to Slack usernames
  # Useful when posting changelogs to Slack
  # slack_users:
  #   octocat: octocat-slack
  #   alice: alice.smith

# Profiles - Named configurations that override top-level defaults
# Use with: uv run shiplog --profile <name>
# Each profile can override any field in github, filters, output, or claude sections.
# Fields not specified in a profile inherit from the top-level config.
#
# profiles:
#   internal:
#     github:
#       repositories:
#         - "company/repo1"
#         - "company/repo2"
#         - "company/repo3"
#     output:
#       slack_users:
#         alice: alice.smith
#         bob: bob.jones
#
#   public:
#     github:
#       repositories:
#         - "company/main-repo"
#     output:
#       skip_categorization: true
#     filters:
#       since: "30d"
#
#   quick:
#     # Skip all AI processing for fast output with original PR titles
#     output:
#       skip_categorization: true
#       skip_summaries: true
